<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro</title>

  <script src="../assents/js/sessao.js"></script>
  <script src="../assents/js/alerta.js"></script>

  <link rel="stylesheet" href="../assents/styles/login_style.css" />
  <link rel="icon" href="assets/icons" />
  <link rel="preconnect" href="https://fonts.gstatic.com" />
  <link rel="stylesheet" href="">

</head>

<body>

  <div class="imagem-card imagem-card-cadastro">
    <div class="titulo-card">
      <h1>Cadastre-se</h1>
    </div>
    <div class="container-card">
      <div class="card">
        <p>Sinta a vibração, entenda o ritmo. Sua jornada para dominar a música começa aqui.</p>
      </div>
    </div>
  </div>

  <div class="container">
    <div class="container-box-cadastro">
      <div class="formulario">
        <div class="campo">
          <div class="frase">
            <a>Nome Completo*</a>
          </div>
          <input type="text" id="input_nome" placeholder="Nome*">
        </div>
        <div class="campo">
          <div class="frase">
            <a>Email*</a>
          </div>
          <input type="text" id="input_email" placeholder="Email*">
        </div>
        <div class="campo">
          <div class="frase">
            <a>Senha*</a>
          </div>
          <input type="password" id="input_senha" placeholder="Senha*">
        </div>
        <div class="campo">
          <div class="frase">
            <a>Confirmar Senha*</a>
          </div>
          <input type="password" id="input_confirmarSenha" placeholder="Confirmar senha*">
        </div>

        <button class="botao-CadastrarU" onclick="cadastrar()">CADASTRE-SE</button>
        <div class="mensagemConta">Já possui uma conta? <a href="login.html" class="">Faça login!</a></div>
      </div>

      <div class="login">
        <div class="alerta_erro">
          <div class="card_erro" id="cardErro">
            <span id="mensagem_erro"></span>
          </div>
        </div>

      </div>
    </div>


</body>

</html>
<script>


  let listaDominio = [
    "@gmail.com", "@outlook.com",
    "@hotmail.com", "@live.com",
    "@yahoo.com", "@yahoo.com.br",
    "@icloud.com", "@me.com",
    "@sptech.school"
  ]

  let listaCaracEspeciais = [
    "@", "#", "$", "%", "&", "*", "!",
    "?", ".", ",", "-", "_", "+", "=",
    "/", "|", "(", ")", "[", "]", "{",
    "}", `'`, `"`, '`', "+", "-", "="]

  function cadastrar() {
    // aguardar();

    //Recupere o valor da nova input pelo nome do id
    // Agora vá para o método fetch logo abaixo
    var nomeVar = input_nome.value;
    var emailVar = input_email.value;
    var senhaVar = input_senha.value;
    var confirmacaoSenhaVar = input_confirmarSenha.value;

    let temDominio = true;
    let temCaracEspecial = true;
    let temLetra = true;

    let senhaVarMinuscula = senhaVar.toLowerCase();
    let senhaVarMaiuscula = senhaVar.toUpperCase();

    // Verificando se no email há algum domínio sendo utilizado



    for (let i = 0; i < listaDominio.length; i++) {
      if (emailVar.includes(listaDominio[i])) {

        temDominio = true;
        break
      }
      else {

        temDominio = false;
      }
    }

    // Verificando se na senha tem no mínimo um caractere especial
    for (let i = 0; i <= listaCaracEspeciais.length; i++) {
      if (senhaVar.includes(listaCaracEspeciais[i])) {

        temCaracEspecial = true;
        break
      }
      else {

        temCaracEspecial = false;
      }
    }

    // Verificando se na senha tem no mínimo uma letra
    for (let i = 0; i <= senhaVar.length; i++) {

      let caractere = senhaVar[i];

      if ((caractere >= "A" && caractere <= "Z" || caractere >= "a" && caractere <= "z")) {

        temLetra = true;
        break
      }
      else {

        temLetra = false;
      }
    }


    // Verificando se há algum campo em branco
    if (
      nomeVar == "" ||
      emailVar == "" ||
      senhaVar == "" ||
      confirmacaoSenhaVar == ""

    ) {
      alert("Erro! Preencha todos os campos corretamente");

      finalizarAguardar();
      return false;
    }

    else if (!(nomeVar.length > 2)) {
      alert("Nome Inválido! Insira o nome corretamente");

      finalizarAguardar();
      return false;
    }

    else if (!(emailVar.includes('@') && emailVar.includes('.'))) {
      alert("Email Inválido! Preencha o campo corretamente");

      finalizarAguardar();
      return false;
    }
    else if (!(senhaVar.length >= 6)) {
      alert("Senha Inválida! A senha deve conter no mínimo 6 caracteres");

      finalizarAguardar();
      return false;
    }
    else if (!(confirmacaoSenhaVar == senhaVar)) {
      alert("Senha Inválida! Preencha o campo corretamente");

      finalizarAguardar();
      return false;
    }
    else if (temDominio == false) {
      alert("Email Inválido! Insira o domínio do email corretamente");

      finalizarAguardar();
      return false;

    }
    else if (temCaracEspecial == false) {
      alert("Senha Inválida! A senha deve conter no mínimo um caractere Especial");

      finalizarAguardar();
      return false;

    }
    else if (temLetra == false) {
      alert("Senha Inválida! A senha deve conter no mínimo uma letra");

      finalizarAguardar();
      return false;

    }
    else if (senhaVar == senhaVarMinuscula) {
      alert("Senha Inválida! A senha precisa de ao menos uma letra maiúscula!");

      finalizarAguardar();
      return false;
    }
    else if (senhaVar == senhaVarMaiuscula) {
      alert("Senha Inválida! A senha precisa de ao menos uma letra minúscula!");

      finalizarAguardar();
      return false;
    }
    else {
      setInterval(sumirMensagem, 5000);
    }

    // Enviando o valor da nova input
    fetch("/usuarios/cadastrar", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
      },
      body: JSON.stringify({
        // crie um atributo que recebe o valor recuperado aqui
        // Agora vá para o arquivo routes/usuario.js
        nomeServer: nomeVar,
        emailServer: emailVar,
        senhaServer: senhaVar,
      }),
    })
      .then(function (resposta) {
        console.log("resposta: ", resposta);

        if (resposta.ok) {

          alert("Cadastro realizado com sucesso! Redirecionando para tela de Login...");

          setTimeout(() => {
            window.location = "login.html";
          }, "2000");

          limparFormulario();
          finalizarAguardar();
        } else {
          throw "Houve um erro ao tentar realizar o cadastro!";
        }
      })
      .catch(function (resposta) {
        console.log(`#ERRO: ${resposta}`);
        finalizarAguardar();
      });

    return false;
  }

  function sumirMensagem() {
    cardErro.style.display = "none";
  }

</script>
