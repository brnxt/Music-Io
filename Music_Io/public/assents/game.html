<body onload="onloadEsconder()">

    <!-- ================== Header ================== -->

    <div class="header">

        <ul class="navbar">
            <li>
                <a href="../assents/index.html">Home</a>
            </li>

                <select name="" id="">

    <div class="banner-quiz">

            <h1>Hora do Quiz!</h1>

        </div>
        <button class="botaoIniciar" id="btnIniciarQuiz" onclick="iniciarQuiz()">Iniciar Quiz</button>

        <div id="jogo" class="jogo-quiz">

            <div class="pergunta">
                <a class="questao">Questão <span id="spanNumeroDaQuestaoAtual"></span>:</a>
                <span id="spanQuestaoExibida" class="questaoExibida"></span>
            </div>

            <div id="opcoes" class="opcoes">
                <span>
                    <input type="radio" id="primeiraOpcao" name="option" class="radio" value="alternativaA" />
                    <label for="primeiraOpcao" class="option" id="labelOpcaoUm"></label>
                </span>
                <span>
                    <input type="radio" id="segundaOpcao" name="option" class="radio" value="alternativaB" />
                    <label for="segundaOpcao" class="option" id="labelOpcaoDois"></label>
                </span>
                <span>
                    <input type="radio" id="terceiraOpcao" name="option" class="radio" value="alternativaC" />
                    <label for="terceiraOpcao" class="option" id="labelOpcaoTres"></label>
                </span>
                <span>
                    <input type="radio" id="quartaOpcao" name="option" class="radio" value="alternativaD" />
                    <label for="quartaOpcao" class="option" id="labelOpcaoQuatro"></label>
                </span>
            </div>

            <div id="botoes" class="botoes">
                <button onclick="submeter()" class="botaoSubmeter" id="btnSubmeter">Submeter resposta</button>
                <button onclick="avancar()" class="botaoAvancar" id="btnProx" disabled>Avançar para próxima
                    questão</button>
            </div>

        </div>
        <div id="resultado" class="resultado-quiz">
            <div class="resultado-titulo">
                <h1>Resultado!</h1>
                <p>Total que questoes acertadas:
                <div id="id_exibirTotalQuestoes"></div>
                </p>
            </div>
            <div class="listas">
                <div class="lista-questoes1">





                </div>
                <div class="lista-questoes2">

                    <!-- Máterias do 4 ao 6 -->



                </div>
            </div>

            <button class="verDashboard" id="verDashboard" onclick="window.location.href='../assents/dashboard.html'">
                Ver Dashboard
            </button>
        </div>



</html>

        {

            alternativaB: "Piano, Violino, Flauta e Trompete",
            alternativaC: "Cordas, Madeiras, Metais e Percussão",
            alternativaD: "Graves, Médios, Agudos e Percussão",
            alternativaCorreta: "alternativaC"
        },
        {
            pergunta: "Quando surgiram as primeiras Orquestras na Europa?",
            alternativaA: "Séc. XVI",
            alternativaB: "Séc. XII",
            alternativaC: "Séc. XIX",
            alternativaD: "Séc. XIV",
            alternativaCorreta: "alternativaA"
        },

        {
            pergunta: "Como o som é produzido?",
            alternativaA: "30 horas",

    let listaAcertosMateria = [];

    // variáveis globais    
    let numeroDaQuestaoAtual = 0
    let pontuacaoTotal = 0
    let erradas = 0;
    let quantidadeDeQuestoes = listaDeQuestoes.length

    function onloadEsconder() {
        document.getElementById('jogo').style.display = `none`
        document.getElementById('resultado').style.display = `none`
        document.getElementById('usuario').innerHTML = sessionStorage.NOME_USUARIO;
        document.getElementById('verDashboard').style.display = `none`
    }

    function iniciarQuiz() {
        document.getElementById('jogo').style.display = `flex`
        document.getElementById('texto').style.display = `none`
        document.getElementById('btnIniciarQuiz').style.display = `none`

        preencherHTMLcomQuestaoAtual(0)

        btnSubmeter.disabled = false
    }

    function preencherHTMLcomQuestaoAtual(index) {
        const questaoAtual = listaDeQuestoes[index]
        numeroDaQuestaoAtual = index
        console.log("questaoAtual")
        document.getElementById("spanNumeroDaQuestaoAtual").innerHTML = Number(index) + 1 // ajustando porque o index começa em 0
        document.getElementById("spanQuestaoExibida").innerHTML = questaoAtual.pergunta;
        document.getElementById("labelOpcaoUm").innerHTML = questaoAtual.alternativaA;
        document.getElementById("labelOpcaoDois").innerHTML = questaoAtual.alternativaB;
        document.getElementById("labelOpcaoTres").innerHTML = questaoAtual.alternativaC;
        document.getElementById("labelOpcaoQuatro").innerHTML = questaoAtual.alternativaD;
    }

    function submeter() {
        const options = document.getElementsByName("option"); // recupera alternativas no html

        let hasChecked = false
        for (let i = 0; i < options.length; i++) {
            if (options[i].checked) {
                hasChecked = true
                break
            }
        }

        if (!hasChecked) {
            alert("Não há alternativas escolhidas. Escolha uma opção.")
        } else {
            btnSubmeter.disabled = true
            btnProx.disabled = false

            document.querySelector(".botaoSubmeter").classList.add("respondido")
            document.querySelector(".botaoAvancar").classList.add("respondido")

            checarResposta()
        }
    }

    function avancar() {
        btnProx.disabled = true
        btnSubmeter.disabled = false

        document.querySelector(".botaoSubmeter").classList.remove("respondido")
        document.querySelector(".botaoAvancar").classList.remove("respondido")


        desmarcarRadioButtons()

        if (numeroDaQuestaoAtual < quantidadeDeQuestoes) {
            preencherHTMLcomQuestaoAtual(numeroDaQuestaoAtual)
        } else {
            finalizarJogo()
        }
        limparCoresBackgroundOpcoes()
    }



    function tentarNovamente() {
        // atualiza a página
        window.location.reload()
    }

    function checarResposta() {
        const questaoAtual = listaDeQuestoes[numeroDaQuestaoAtual] // questão atual 
        const respostaQuestaoAtual = questaoAtual.alternativaCorreta // qual é a resposta correta da questão atual

        const options = document.getElementsByName("option"); // recupera alternativas no html

        let alternativaCorreta = null // variável para armazenar a alternativa correta

        options.forEach((option) => {
            if (option.value === respostaQuestaoAtual) {
                console.log("alternativaCorreta está no componente: " + alternativaCorreta)
                alternativaCorreta = option.labels[0].id
            }
        })

        // verifica se resposta assinalada é correta
        options.forEach((option) => {
            if (option.checked === true && option.value === respostaQuestaoAtual) {


                let materiaId = Math.floor(numeroDaQuestaoAtual / 3) + 1;
                listaAcertosMateria.push(materiaId);

                pontuacaoTotal++
                numeroDaQuestaoAtual++
            } else if (option.checked && option.value !== respostaQuestaoAtual) {


                erradas++
                numeroDaQuestaoAtual++
            }
        })
    }

    function limparCoresBackgroundOpcoes() {
        const options = document.getElementsByName("option");
        options.forEach((option) => {
            document.getElementById(option.labels[0].id).classList.remove("text-danger-with-bg")
            document.getElementById(option.labels[0].id).classList.remove("text-success-with-bg")
        })
    }

    function desmarcarRadioButtons() {
        const options = document.getElementsByName("option");
        for (let i = 0; i < options.length; i++) {
            options[i].checked = false;
        }
    }

    function finalizarJogo() {

        document.getElementById('jogo').style.display = `none`
        document.getElementById('resultado').style.display = `flex`
        document.getElementById('verDashboard').style.display = `flex`

        let m1 = 0;
        let m2 = 0;
        let m3 = 0;
        let m4 = 0;
        let m5 = 0;
        let m6 = 0;

        for (let i = 0; i < listaAcertosMateria.length; i++) {

            let materiaAtual = listaAcertosMateria[i]

            if (materiaAtual == 1) {

                m1++
            } else if (materiaAtual == 2) {

                m2++
            } else if (materiaAtual == 3) {

                m3++
            } else if (materiaAtual == 4) {

                m4++
            } else if (materiaAtual == 5) {

                m5++
            } else if (materiaAtual == 6) {

                m6++
            }
        }

        document.getElementById("id_exibirTotalQuestoes").innerHTML = `${pontuacaoTotal} /18 `



        document.querySelector('.lista-questoes1').innerHTML = `
        
                    <div class="materia-card">
                        <p>Som e Música</p>
                        <div class="materia-container-barra">
                            <div class="materia-barra" style="width: ${(m1 / 3) * 100}%"></div>
                        </div>
                            <p class="texto-acertos">${m1}/3 acertos</p>
                    </div>

                    <div class="materia-card">
                        <p>Pilares da Música</p>
                        <div class="materia-container-barra">
                            <div class="materia-barra" style="width: ${(m2 / 3) * 100}%"></div>
                        </div>
                            <p class="texto-acertos">${m2}/3 acertos</p>
                    </div>

                    <div class="materia-card">
                        <p>Máquinas de Som</p>
                        <div class="materia-container-barra">
                            <div class="materia-barra" style="width: ${(m3 / 3) * 100}%"></div>
                        </div>
                            <p class="texto-acertos">${m3}/3 acertos</p>
                    </div>
                    `


        document.querySelector('.lista-questoes2').innerHTML = `
                    
                    <div class="materia-card" >
                        <p>Linha do Tempo</p>
                        <div class="materia-container-barra">
                            <div class="materia-barra" style="width: ${(m4 / 3) * 100}%"></div>
                        </div>
                            <p class="texto-acertos">${m4}/3 acertos</p>
                    </div>

                    <div class="materia-card">
                        <p>Mente e Ritmo</p>
                        <div class="materia-container-barra">
                            <div class="materia-barra" style="width: ${(m5 / 3) * 100}%"></div>
                        </div>
                            <p class="texto-acertos">${m5}/3 acertos</p>
                    </div>

                    <div class="materia-card">
                        <p>A Orquestra</p>
                        <div class="materia-container-barra">
                            <div class="materia-barra" style="width: ${(m6 / 3) * 100}%"></div>
                        </div>
                            <p class="texto-acertos">${m6}/3 acertos</p>
                    </div>

        `

        // document.querySelector = consegue pegar tags de CSS no "documento"


        btnProx.disabled = true
        btnSubmeter.disabled = true
        // btnConcluir.disabled = true
        // btnTentarNovamente.disabled = false

        fetch("/quiz/receberDados", {
            method: "POST",
            headers: {
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                pontuacaoTotal: pontuacaoTotal,
                m1: m1,
                m2: m2,
                m3: m3,
                m4: m4,
                m5: m5,
                m6: m6,
                fkUsuarioServer: sessionStorage.ID_USUARIO,
            }),
        })

            .then(function (resposta) {
                console.log("Deu certo!")
            })

            .catch(function (resposta) {

                console.log(erro);
            })
    }


</script>
