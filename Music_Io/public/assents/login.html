<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>

    <script src="../assents/js/sessao.js"></script>
    <script src="../assents/js/alerta.js"></script>

    <link rel="stylesheet" href="/assents/styles/login_style.css" />
    <link rel="icon" href="assets/icons" />
    <link rel="preconnect" href="https://fonts.gstatic.com" />

</head>

<body>

    <div class="imagem-card">
        <div class="titulo-card">
            <h1>Bem-vindo</h1>
        </div>
        <div class="container-card">
            <div class="card">
                <p>Sinta a vibração, entenda o ritmo. Sua jornada para dominar a música começa aqui.</p>
            </div>
        </div>
    </div>


    <div class="container">
        <div class="container-box">
            <div class="formulario">
                <div class="campo">
                    <div class="frase">
                        <a>Email*</a>
                    </div>
                    <input id="email_input" type="text" placeholder="Email*">
                </div>
                <div class="campo">
                    <div class="frase">
                        <a>Senha*</a>
                    </div>
                    <input id="senha_input" type="password" placeholder="Senha*">
                </div>
                <button class="botaoEntrar" onclick="entrar()">ENTRAR</button>
                <div class="ou">ou</div>
                <button class="botaoCadastrar" onclick="window.location.href='cadastro.html'">Cadastre-se</button>
            </div>

            <div class="login">
                <div class="alerta_erro">
                    <div class="card_erro" id="cardErro">
                        <span id="mensagem_erro"></span>
                    </div>
                </div>

                <div id="div_aguardar" class="loading-div">
                    <img src="../assents/icons/images/circle-loading.gif" id="loading-gif">
                </div>

                <div id="div_erros_login"></div>

            </div>
        </div>


</body>

</html>
<script>
    
    function entrar() {
        console.log("A FUNÇÃO ENTRAR COMEÇOU!");
        //aguardar();

        var emailVar = email_input.value;
        var senhaVar = senha_input.value;

        if (emailVar == "" || senhaVar == "") {
            cardErro.style.display = "block"
            mensagem_erro.innerHTML = "(Mensagem de erro para todos os campos em branco)";
            //finalizarAguardar();
            return false;
        }
        else {
            setInterval(sumirMensagem, 5000)
        }

        console.log("FORM LOGIN: ", emailVar);
        console.log("FORM SENHA: ", senhaVar);

        fetch("/usuarios/autenticar", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                emailServer: emailVar,
                senhaServer: senhaVar
            })
        }).then(function (resposta) {
            console.log("ESTOU NO THEN DO entrar()!")

            if (resposta.ok) {
                console.log(resposta);

                resposta.json().then(json => {
                    console.log(json);
                    console.log(JSON.stringify(json));
                    sessionStorage.EMAIL_USUARIO = json.email;
                    sessionStorage.NOME_USUARIO = json.nome;
                    sessionStorage.ID_USUARIO = json.id;
                    //sessionStorage.AQUARIOS = JSON.stringify(json.aquarios)

                    setTimeout(function () {
                        alert("Login realizado com sucesso!")
                        window.location.href = "./game.html";
                    }, 1000); // apenas para exibir o loading

                });

            } else {

                console.log("Houve um erro ao tentar realizar o login!");

                resposta.text().then(texto => {
                    console.error(texto);
                    //finalizarAguardar(texto);
                });
            }

        }).catch(function (erro) {
            console.log(erro);
        })

        return false;
    }

    function sumirMensagem() {
        cardErro.style.display = "none"
    }

</script>
