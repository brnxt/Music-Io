<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assents/styles/dashboard.css" />
    <title>Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap"
        rel="stylesheet">
</head>

<body class="row" onload="obterDados();verificarLogin()">

    <div class="sidebar">
        <div class="sidebar-container">
            <div class="icone"><img src="../assents/icons/usuario.png" alt=""></div>
            <p>Olá, <span id="usuario"></span></p>

            <ul class="sidebar-lista">
                <li>
                    <a href="../assents/index.html">Home</a>
                </li>
                <li>
                    <a href="../assents/game.html">Quiz</a>
                </li>
                <li>
                    <a href="../assents/index.html#descubra-mais">Descubra Mais</a>
                </li>
            </ul>
        </div>
    </div>

    <div class="dashboard">
        <div class="dashboard-container">

            <div class="kpi-container">
                <div class="kpi">

                    <h3>Ranking Atual da Tabela:</h3>

                    <p><span id="kpi1"></span>º Posição</p>

                </div>

                <div class="kpi">

                    <h3>Média Geral de Acertos <br> por Tentativa:</h3>

                    <p><span id="kpi2"></span> Questões Corretas</p>
                </div>

                <div class="kpi">

                    <h3>Matéria Crítica: <br><span id="materia-critica"></span></h3>

                    <p>Total de acertos: <span id="kpi3"></span></p>

                </div>
            </div>

            <div class="grafico-container">
                <div class="grafico-line">
                    <canvas id="grafico-linha"></canvas>
                </div>

                <div class="grafico-bars">
                    <canvas id="grafico-barras"></canvas>
                </div>

                <div class="tabela-ranking">
                    <h3>Tabela Ranking</h3>
                    <div class="linha-ranking" id="div_exibir"></div>
                </div>

            </div>

        </div>
    </div>

</body>

</html>
<script>



    function verificarLogin() {
        document.getElementById('usuario').innerHTML = sessionStorage.NOME_USUARIO
    }

    function obterDados() {

        var idUsuario = sessionStorage.ID_USUARIO;

        fetch(`/dashboard/listar/${idUsuario}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }
        })

            .then(function (resposta) {
                if (resposta.ok) {

                    return resposta.json();
                }
            })

            .then(function (json) {

                plotarGraficoBarra(json);
            })

            .catch(function (erro) {
                console.error(`Erro no fetch: ${erro.message}`,);
            });




        // fetch Gráfico linha


        fetch(`/dashboard/listarUltimos5/${idUsuario}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }
        })

            .then(function (respostaLinha) {
                if (respostaLinha.ok) {

                    return respostaLinha.json();
                }
            })

            .then(function (jsonLinha) {

                plotarGraficoLinha(jsonLinha);
            })

            .catch(function (erro) {
                console.error(`Erro no fetch: ${erro.message}`);
            });


        /* ================ Primeira KPI: Ranking ================ */

        fetch(`/dashboard/listarKpi1/${idUsuario}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }
        })

            .then(function (respostaKpi1) {

                if (respostaKpi1.ok) {

                    return respostaKpi1.json();
                }
            })

            .then(function (kpi1) {


                listarKpi1(kpi1)
            })

            .catch(function (erro) {
                console.error(`Erro no fetch: ${erro.message}`);
            })


        /* ================ Segunda KPI: Média geral por tentativa ================ */


        fetch(`/dashboard/listarKpi2/${idUsuario}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }

        })

            .then(function (respostaKpi2) {

                if (respostaKpi2.ok) {

                    return respostaKpi2.json();
                }
            })

            .then(function (kpi2) {

                listarKpi2(kpi2)
            })

            .catch(function (erro) {
                console.error(`Erro no fetch: ${erro.message}`);
            })







        /* ================ Terceira KPI: Matéria Crítica ================ */

        fetch(`/dashboard/listarKpi3/${idUsuario}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }

        })

            .then(function (respostaKpi3) {

                if (respostaKpi3.ok) {

                    return respostaKpi3.json();
                }
            })

            .then(function (kpi3) {



                listarKpi3(kpi3)
            })

            .catch(function (erro) {
                console.error(`Erro no fetch: ${erro.message}`);
            })


        /* ================ Tabela Ranking ================ */

        fetch(`/dashboard/listarTabela/${idUsuario}`, {
            method: "GET",
            headers: {
                "Content-Type": "application/json"
            }

        })

            .then(function (respostaTabela) {

                if (respostaTabela.ok) {

                    return respostaTabela.json();
                }
            })

            .then(function (tabela) {

                console.log("Dados Tabela : ", JSON.stringify(tabela))

                listarTabela(tabela)
            })

            .catch(function (erro) {
                console.error(`Erro no fetch: ${erro.message}`);
            })


    }




    /* ================ Função para plotar o gráfico de linha ================ */


    function plotarGraficoLinha(jsonLinha) {

        let dadosPontuacao = [0, 0, 0, 0, 0]
        let dadosData = ["-", "-", "-", "-", "-"]


        for (let i = 0; i < jsonLinha.length; i++) {

            dadosPontuacao[i] = Number(jsonLinha[i].pontuacao_total)
            dadosData[i] = (jsonLinha[i].dtHora)

        }

        // Capturando o elemento canvas pelo id 
        var ctx = document.getElementById('grafico-linha').getContext('2d');
        // Criando o gráfico de linha usando o Chart.js
        var myChart = new Chart(ctx, {
            type: 'line', // Tipo de gráfico: linha
            data: { // Dados para o gráfico
                labels: dadosData, // Rótulos no eixo X
                datasets: [{
                    label: 'Histórico 5 Últimas tentativas', // Nome do conjunto de dados
                    data: dadosPontuacao, // Dados dos votos
                    backgroundColor: [
                        '#38b6ff', // Cor de fundo das linhas
                    ],
                    borderColor: [
                        '#38b6ff', // Cor da borda das linhas
                    ],
                    borderWidth: 1,// Largura da borda das linhas
                    tension: 0.3
                }]
            },
            options: {
                plugins: {
                    legend: {
                        labels: {
                            color: 'white'
                        }
                    }
                },
                scales: {
                    x: { ticks: { color: 'white' } },
                    y: { ticks: { color: 'white' } },
                }
            }
        });


    }


    /* ================ Função para plotar o gráfico de barra ================ */
    function plotarGraficoBarra(json) {


        var listaDadosJson = [];
        var listaMaterias = ['Som e Música', 'Pilares da Música', 'Máquinas de Som', 'Linha do Tempo', 'Mente e ritmo', 'A Orquestra']

        for (let i = 1; i <= 6; i++) {

            listaDadosJson.push(json[0]["m" + i])
        }



        var ctx = document.getElementById('grafico-barras').getContext('2d');

        // Criando o gráfico de barra usando o Chart.js
        var myChart = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: listaMaterias,
                datasets: [{
                    label: 'Pontuação da Última tentativa por matéria',
                    data: listaDadosJson,
                    backgroundColor: [
                        '#38b6ff',
                    ],
                    borderColor: [
                        '#38b6ff',
                    ],
                    borderWidth: 1

                }]
            },
            options: {
                plugins: {
                    legend: {
                        labels: {
                            color: 'white'
                        }
                    }
                },
                scales: {
                    x: { ticks: { color: 'white' } },
                    y: { ticks: { color: 'white' } },
                }
            }
        });


    }




    function listarKpi1(kpi1) {


        document.getElementById("kpi1").innerHTML = kpi1[0].posicao_atual
    }



    function listarKpi3(kpi3) {

        var listaPontuacaoSum = [];
        var listaMaterias = ['Som e Música', 'Pilares da Música', 'Máquinas de Som', 'Linha do Tempo', 'Mente e ritmo', 'A Orquestra']


        for (let i = 0; i < 6; i++) {

            listaPontuacaoSum.push(Number(kpi3[0]["m" + (i + 1)]))
        }

        var menorPontuacao = listaPontuacaoSum[0];
        var indiceMateria = listaMaterias[0];

        for (let i = 0; i < listaPontuacaoSum.length; i++) {

            if (menorPontuacao > listaPontuacaoSum[i]) {

                menorPontuacao = listaPontuacaoSum[i]

                indiceMateria = listaMaterias[i]
            }

        }

        document.getElementById("kpi3").innerHTML = menorPontuacao
        document.getElementById("materia-critica").innerHTML = indiceMateria

    }

    function listarKpi2(kpi2) {


        document.getElementById("kpi2").innerHTML = kpi2[0].media_geral;
    }

    function listarTabela(tab) {

        let listaNomes = []
        let listaPontos = []

        for (let i = 0; i < tab.length; i++) {

            listaNomes.push(tab[i].Nome)
            listaPontos.push(tab[i].pontuacao_total)
        }

        for (let i = 0; i < listaNomes.length; i++) {

            div_exibir.innerHTML += `
            ${i + 1}º - ${listaNomes[i]}: ${listaPontos[i]} pts <br>
            
            `
        }
    }

</script>
